name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./BE_PHONGDAOTAO
          file: ./BE_PHONGDAOTAO/Dockerfile
          push: true
          tags: |
            ghcr.io/nguyenmanhbai/myapp-backend:latest
            ghcr.io/nguyenmanhbai/myapp-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./FE_PHONGDAOTAO
          file: ./FE_PHONGDAOTAO/Dockerfile
          push: true
          tags: |
            ghcr.io/nguyenmanhbai/myapp-frontend:latest
            ghcr.io/nguyenmanhbai/myapp-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
