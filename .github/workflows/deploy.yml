name: CI/CD Deploy PHONGDAOTAO to TV Box

on:
  push:
    branches:
      - main # Tự động chạy khi bạn push code vào nhánh main

jobs:
  deploy-backend:
    runs-on: self-hosted # Chạy bằng con Runner cài trên TV Box
    steps:
      - name: Checkout mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Cài đặt và cập nhật code NodeJS Backend
        run: |
          # Di chuyển vào đúng thư mục Backend viết hoa
          cd BE_PHONGDAOTAO
          
          # Cài đặt node_modules sạch môi trường Production
          npm install --production
          
          # Đẩy toàn bộ source code vào container NodeJS trên TV Box
          docker cp . node_backend_app:/app/
          
          # Khởi chạy chạy ứng dụng NodeJS ngầm bên trong container
          # LƯU Ý: Thay thế 'server.js' bằng file chạy chính của bạn (ví dụ: index.js, app.js...) nếu có thay đổi
          docker exec -d node_backend_app sh -c "NODE_ENV=production PORT=8080 node server.js"

  deploy-frontend:
    runs-on: self-hosted
    steps:
      - name: Checkout mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Cài đặt và Build Frontend ReactJS
        run: |
          # Di chuyển vào đúng thư mục Frontend viết hoa
          cd FE_PHONGDAOTAO
          
          npm install
          
          # Tạo biến môi trường trỏ API về đúng Subdomain Cloudflare bạn vừa tạo ở bước trước
          echo "REACT_APP_API_URL=https://api-phongdaotao.mnhwua.id.vn" > .env
          
          # Tiến hành biên dịch mã nguồn React
          npm run build

      - name: Đồng bộ file tĩnh vào container Nginx công cộng
        run: |
          # Xóa các file tĩnh cũ trong container Nginx
          docker exec react_frontend_app sh -c "rm -rf /usr/share/nginx/html/*"
          
          # Copy đè thư mục build mới vừa biên dịch xong vào Nginx
          docker cp FE_PHONGDAOTAO/build/. react_frontend_app:/usr/share/nginx/html/